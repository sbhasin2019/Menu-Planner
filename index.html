<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#FAEDD4">
<title>Ghar ka Menu</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg%20xmlns=%22http://www.w3.org/2000/svg%22%20viewBox=%220%200%20512%20512%22><%21--%20saffron%20paper%20--><rect%20width=%22512%22%20height=%22512%22%20fill=%22#FAEDD4%22/><%21--%20plate%20--><circle%20cx=%22256%22%20cy=%22262%22%20r=%22186%22%20fill=%22#FFFAF0%22%20stroke=%22#20242F%22%20stroke-width=%2216%22/><circle%20cx=%22256%22%20cy=%22262%22%20r=%22148%22%20fill=%22none%22%20stroke=%22#20242F%22%20stroke-width=%226%22%20opacity=%220.18%22/><%21--%20katoris%20--><circle%20cx=%22178%22%20cy=%22190%22%20r=%2254%22%20fill=%22#EFA51E%22%20stroke=%22#20242F%22%20stroke-width=%2212%22/><circle%20cx=%22334%22%20cy=%22190%22%20r=%2254%22%20fill=%22#2E7D4F%22%20stroke=%22#20242F%22%20stroke-width=%2212%22/><ellipse%20cx=%22163%22%20cy=%22176%22%20rx=%2216%22%20ry=%2210%22%20fill=%22#FFFAF0%22%20opacity=%220.45%22/><ellipse%20cx=%22319%22%20cy=%22176%22%20rx=%2216%22%20ry=%2210%22%20fill=%22#FFFAF0%22%20opacity=%220.45%22/><%21--%20mirchi%20katori%20--><circle%20cx=%22256%22%20cy=%22330%22%20r=%2262%22%20fill=%22#D6452C%22%20stroke=%22#20242F%22%20stroke-width=%2212%22/><ellipse%20cx=%22238%22%20cy=%22314%22%20rx=%2218%22%20ry=%2211%22%20fill=%22#FFFAF0%22%20opacity=%220.4%22/><%21--%20roti%20between%20top%20katoris%20--><circle%20cx=%22256%22%20cy=%22222%22%20r=%2244%22%20fill=%22#EFC98A%22%20stroke=%22#20242F%22%20stroke-width=%2210%22/><circle%20cx=%22244%22%20cy=%22212%22%20r=%226%22%20fill=%22#20242F%22%20opacity=%220.35%22/><circle%20cx=%22268%22%20cy=%22230%22%20r=%225%22%20fill=%22#20242F%22%20opacity=%220.35%22/><circle%20cx=%22258%22%20cy=%22206%22%20r=%224%22%20fill=%22#20242F%22%20opacity=%220.3%22/></svg>">
<link rel="apple-touch-icon" href="icon-180.png">
<link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Ghar Menu">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;700;800&family=Karla:wght@400;500;700&family=Noto+Sans+Devanagari:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --aam:#FAEDD4; --card:#FFFAF0; --ink:#20242F; --muted:#6B6353; --line:#E4D6B8;
  --mirchi:#D6452C; --mirchi-soft:#F9DFD6;
  --haldi:#EFA51E; --haldi-soft:#FBEAC4;
  --dhaniya:#2E7D4F; --dhaniya-soft:#DDEDD9;
  --steel:#2B5C8A; --steel-soft:#DCE7F2;
  --r:16px;
  --disp:'Baloo 2','Noto Sans Devanagari',system-ui,sans-serif;
  --body-font:Karla,'Noto Sans Devanagari',system-ui,sans-serif;
}
*{box-sizing:border-box; -webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0}
body{background:var(--aam); background-image:radial-gradient(rgba(32,36,47,.045) 1px, transparent 1.1px); background-size:22px 22px;
  color:var(--ink); font-family:var(--body-font); font-size:16px; line-height:1.45; padding-bottom:92px}
body.hi{font-family:'Noto Sans Devanagari',Karla,system-ui,sans-serif}
.wrap{max-width:680px; margin:0 auto; padding:0 14px}
header.app{padding:18px 0 8px; display:flex; align-items:center; justify-content:space-between; gap:10px}
h1.brand{font-family:var(--disp); font-weight:800; font-size:27px; margin:0; letter-spacing:-.3px}
h1.brand .dot{color:var(--mirchi)}
.hbtns{display:flex; align-items:center; gap:8px}
.langpill{display:flex; border:2px solid var(--ink); border-radius:999px; overflow:hidden; background:var(--card)}
.langpill button{border:none; background:none; padding:6px 12px; font-family:var(--disp); font-size:13px; font-weight:700; color:var(--muted); cursor:pointer}
.langpill button.on{background:var(--ink); color:var(--haldi)}
.gear{border:2px solid var(--ink);background:var(--card);font-size:16px;cursor:pointer;color:var(--ink);width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center}
.sub{color:var(--muted); font-size:13px; margin:0 0 10px}
nav.tabs{position:fixed; bottom:0; left:0; right:0; background:var(--ink); display:flex; z-index:50; padding-bottom:env(safe-area-inset-bottom); box-shadow:0 -4px 16px rgba(32,36,47,.25)}
nav.tabs button{flex:1; border:none; background:none; padding:11px 0 9px; font-family:var(--disp); font-size:11.5px; font-weight:700; color:rgba(250,237,212,.5); cursor:pointer; position:relative; transition:color .15s}
nav.tabs button .ic{display:block; font-size:19px; margin-bottom:2px; filter:grayscale(1) opacity(.6); transition:filter .15s, transform .15s}
nav.tabs button.on{color:var(--haldi)}
nav.tabs button.on .ic{filter:none; transform:translateY(-2px)}
nav.tabs button.on::after{content:''; position:absolute; top:0; left:25%; right:25%; height:3px; border-radius:0 0 4px 4px; background:var(--haldi)}
.page{display:none}
.page.on{display:block}
.btn{border:2px solid var(--ink); border-radius:999px; padding:10px 16px; font-family:var(--disp); font-weight:700; font-size:14px; cursor:pointer; box-shadow:3px 3px 0 var(--ink); transition:transform .08s, box-shadow .08s}
.btn:active{transform:translate(2px,2px); box-shadow:1px 1px 0 var(--ink)}
.btn.primary{background:var(--mirchi); color:#FFFAF0}
.btn.ghost{background:var(--card); color:var(--ink)}
.btn.small{padding:6px 12px; font-size:13px}
.btnrow{display:flex; gap:10px; flex-wrap:wrap; margin:10px 0 14px}
/* quota dabba */
.qbar{background:var(--ink); border-radius:var(--r); padding:11px 14px; margin-bottom:16px; display:flex; gap:14px; flex-wrap:wrap; font-size:12.5px}
.qbar .qi{display:flex; align-items:center; gap:6px; font-weight:700; color:rgba(250,237,212,.85); font-family:var(--disp)}
.qbar .qi .meter{display:flex; gap:2.5px; margin-left:2px}
.qbar .qi .meter i{width:7px;height:7px;border-radius:50%;border:1.5px solid currentColor;display:inline-block}
.qbar .qi .meter i.f{background:currentColor}
.qbar .qi.over{color:#FF9B85}
.qbar .qi.met{color:var(--haldi)}
/* day cards = menu tickets */
.day{background:var(--card); border:2px solid var(--ink); border-radius:var(--r); box-shadow:5px 5px 0 rgba(32,36,47,.14); margin-bottom:18px; overflow:hidden; animation:dealIn .4s cubic-bezier(.2,.7,.3,1.1) both}
.day:nth-child(2){animation-delay:.04s}.day:nth-child(3){animation-delay:.08s}.day:nth-child(4){animation-delay:.12s}
.day:nth-child(5){animation-delay:.16s}.day:nth-child(6){animation-delay:.2s}.day:nth-child(7){animation-delay:.24s}.day:nth-child(8){animation-delay:.28s}
@keyframes dealIn{from{opacity:0; transform:translateY(16px) rotate(.4deg)}to{opacity:1; transform:none}}
.day .dayhead{display:flex; align-items:baseline; gap:10px; padding:9px 16px 8px; background:var(--ink); color:var(--aam); border-bottom:2px dashed var(--line); position:relative}
.day .dayname{font-family:var(--disp); font-weight:800; font-size:19px; color:var(--haldi); letter-spacing:.2px}
.day .daydate{color:rgba(250,237,212,.7); font-size:12.5px; font-family:var(--disp)}
.day.today .dayhead{background:var(--mirchi)}
.day.today .dayname{color:#FFFAF0}
.day.today .daydate{color:rgba(255,250,240,.85)}
.day.wknd:not(.today) .dayhead{background:var(--dhaniya)}
.day.wknd:not(.today) .dayname{color:#FFFAF0}
.slot{padding:10px 12px 10px 13px; border-bottom:1px solid var(--line); border-left:5px solid var(--rail,transparent)}
.slot:last-child{border-bottom:none}
.slot .top{display:flex; align-items:center; gap:10px}
.slot .meal{width:58px; flex-shrink:0; font-family:var(--disp); font-size:10.5px; font-weight:700; letter-spacing:.5px; color:var(--muted); text-transform:uppercase}
.slot .meal small{display:block; font-weight:400; text-transform:none; letter-spacing:0; font-size:10px}
.slot .body{flex:1; min-width:0; cursor:pointer}
.slot .rname{font-family:var(--disp); font-weight:700; font-size:16px; line-height:1.25}
.slot .rmeta{font-size:12px; color:var(--muted); display:flex; align-items:center; gap:6px; margin-top:2px; flex-wrap:wrap}
.pdot{width:9px;height:9px;border-radius:50%;display:inline-block;flex-shrink:0;border:1.5px solid rgba(32,36,47,.25)}
.slot .acts{display:flex; gap:0}
.iconbtn{border:none;background:none;font-size:16px;cursor:pointer;padding:6px;color:var(--muted);border-radius:8px;transition:transform .1s}
.iconbtn:active{transform:scale(1.25)}
.iconbtn.locked{color:var(--haldi); filter:none}
.mealblock{border-bottom:1px solid var(--line); padding-bottom:10px}
.mealblock:last-child{border-bottom:none; padding-bottom:6px}
.mealhead{display:flex; align-items:baseline; gap:8px; padding:10px 16px 4px; font-family:var(--disp); font-size:11px; font-weight:800; letter-spacing:.6px; text-transform:uppercase; color:var(--mirchi)}
.mealhead small{font-weight:400; text-transform:none; letter-spacing:0; font-size:10.5px; color:var(--muted)}
.mealhead .changelink{margin-left:auto; color:var(--steel); cursor:pointer; text-transform:none; letter-spacing:0; font-size:12px; text-decoration:underline; font-weight:700}
.pickhint{font-size:11px; color:var(--muted); padding:0 16px 7px}
.dishbub{display:flex; align-items:center; gap:10px; margin:0 12px 7px; padding:10px 12px; border:2px solid var(--line); border-radius:13px; background:var(--card); cursor:pointer; transition:border-color .1s, background .1s, box-shadow .1s}
.dishbub.on{border-color:var(--ink); background:var(--haldi-soft); box-shadow:2px 2px 0 var(--ink)}
.dishbub .tickc{width:22px; height:22px; border-radius:50%; border:2px solid var(--line); flex-shrink:0; display:flex; align-items:center; justify-content:center; font-size:13px; font-weight:800; color:#fff; background:var(--card)}
.dishbub.on .tickc{background:var(--dhaniya); border-color:var(--ink)}
.dishbub .infobtn{border:none; background:none; font-size:15px; color:var(--steel); cursor:pointer; padding:3px 2px; flex-shrink:0; filter:grayscale(1) opacity(.5)}
.dishbub .infobtn.liked{filter:none; opacity:1; transform:scale(1.15)}
.oname{font-family:var(--disp); font-weight:700; font-size:15px; line-height:1.25}
.ometa{font-size:11.5px; color:var(--muted); display:flex; gap:5px; align-items:center; flex-wrap:wrap; margin-top:1px}
.saverow{display:flex; gap:8px; padding:4px 16px 2px}
.savedrow{display:flex; align-items:center; gap:10px; padding:7px 16px; cursor:pointer}
.savedrow .oname{color:var(--ink)}
.sides{margin:8px 0 0 66px; font-size:12.5px; color:#5d5443; background:var(--haldi-soft); border:1.5px dashed var(--haldi); border-radius:10px; padding:6px 10px; cursor:pointer; line-height:1.5}
.sides b{color:var(--mirchi); font-weight:700}
.empty-slot{color:var(--muted); font-style:italic; font-size:14px}
.chip{display:inline-block; padding:3px 10px; border-radius:999px; font-size:12px; font-weight:700; background:var(--dhaniya-soft); color:var(--dhaniya)}
.chip.cuisine{background:var(--steel-soft); color:var(--steel)}
.chip.warn{background:var(--mirchi-soft); color:var(--mirchi)}
.chip.haldi{background:var(--haldi-soft); color:#8A6310}
.flames{font-size:11px; letter-spacing:-1px}
.searchrow{display:flex; gap:8px; margin:6px 0 10px}
.searchrow input{flex:1; border:2px solid var(--ink); border-radius:999px; padding:10px 16px; font-family:var(--body-font); font-size:15px; background:var(--card)}
.filters{display:flex; gap:7px; overflow-x:auto; padding:2px 2px 10px}
.filters::-webkit-scrollbar{display:none}
.fchip{flex-shrink:0; border:2px solid var(--ink); background:var(--card); border-radius:999px; padding:6px 13px; font-family:var(--disp); font-size:13px; font-weight:700; color:var(--ink); cursor:pointer}
.fchip.on{background:var(--haldi); box-shadow:2px 2px 0 var(--ink)}
.rcard{background:var(--card); border:2px solid var(--ink); border-radius:var(--r); box-shadow:3px 3px 0 rgba(32,36,47,.12); padding:13px 16px; margin-bottom:11px; cursor:pointer; display:flex; align-items:center; gap:12px; transition:transform .08s}
.rcard:active{transform:translate(1px,1px)}
.rcard.hiddenr{opacity:.45}
.rcard .info{flex:1; min-width:0}
.rcard .nm{font-family:var(--disp); font-weight:700; font-size:16px}
.rcard .mt{font-size:12.5px; color:var(--muted); margin-top:2px; display:flex; gap:8px; align-items:center; flex-wrap:wrap}
.kidflags{display:flex; flex-direction:column; gap:3px; font-size:10.5px; font-weight:700; text-align:right; flex-shrink:0; font-family:var(--disp)}
.kidflags .no{color:var(--mirchi)}
.kidflags .ok{color:var(--dhaniya)}
.sheetbg{position:fixed; inset:0; background:rgba(32,36,47,.5); z-index:100; display:none}
.sheetbg.on{display:block}
.sheet{position:fixed; left:0; right:0; bottom:0; max-height:88vh; overflow-y:auto; background:var(--aam); border:2px solid var(--ink); border-bottom:none; border-radius:22px 22px 0 0; z-index:101; padding:22px 18px calc(24px + env(safe-area-inset-bottom)); transform:translateY(102%); transition:transform .22s ease; max-width:680px; margin:0 auto}
.sheet::before{content:''; position:absolute; top:8px; left:50%; transform:translateX(-50%); width:44px; height:5px; border-radius:99px; background:var(--line)}
.sheet.on{transform:none}
.sheet h2{font-family:var(--disp); font-weight:800; font-size:22px; margin:6px 24px 4px 0; line-height:1.2}
.sheet .badges{display:flex; gap:6px; flex-wrap:wrap; margin:8px 0 12px}
.sheet h3{font-family:var(--disp); font-size:12px; font-weight:700; letter-spacing:.8px; text-transform:uppercase; color:var(--muted); margin:18px 0 8px}
.ingline{display:flex; justify-content:space-between; gap:12px; padding:7px 0; border-bottom:1px dashed var(--line); font-size:14.5px}
.ingline span:last-child{color:var(--muted); white-space:nowrap}
.stepline{display:flex; gap:10px; margin-bottom:10px; font-size:15px}
.stepline .n{font-family:var(--disp); font-weight:800; color:var(--mirchi); flex-shrink:0; width:18px}
.closex{position:absolute; right:14px; top:14px; border:2px solid var(--ink); background:var(--card); border-radius:50%; width:32px; height:32px; font-size:14px; cursor:pointer}
.sheet .note{background:var(--haldi-soft); border:1.5px dashed var(--haldi); border-radius:10px; padding:10px 12px; font-size:13.5px; color:#6d4f10; margin-bottom:8px}
.siderow{background:var(--card); border:1.5px solid var(--line); border-radius:12px; padding:11px 13px; margin-bottom:9px}
.siderow .lab{font-family:var(--disp); font-size:11px; font-weight:700; letter-spacing:.6px; text-transform:uppercase; color:var(--mirchi); margin-bottom:5px}
.siderow select{width:100%; border:2px solid var(--ink); border-radius:10px; padding:9px 10px; font-family:var(--body-font); font-size:14.5px; background:#fff}
.siderow .snote{font-size:12.5px; color:var(--muted); margin-top:5px}
.siderow .slink{font-size:12.5px; color:var(--steel); font-weight:700; cursor:pointer; margin-top:4px; display:inline-block}
.gsec{background:var(--card); border:2px solid var(--ink); border-radius:var(--r); box-shadow:3px 3px 0 rgba(32,36,47,.12); margin-bottom:13px; padding:6px 16px 10px}
.gsec h3{font-family:var(--disp); font-size:12px; font-weight:700; letter-spacing:.8px; text-transform:uppercase; color:var(--mirchi); margin:10px 0 4px}
.gitem{display:flex; align-items:center; gap:10px; padding:8px 0; border-bottom:1px dashed var(--line); font-size:14.5px}
.gitem:last-child{border-bottom:none}
.gitem input{width:19px; height:19px; accent-color:var(--dhaniya)}
.gitem.done label{text-decoration:line-through; color:var(--muted)}
.gitem label{flex:1}
.gitem .q{color:var(--muted); font-size:13px}
.addrow{display:flex; gap:8px; margin:8px 0 14px}
.addrow input{flex:1; border:2px solid var(--ink); border-radius:999px; padding:9px 15px; font-family:var(--body-font); font-size:14px; background:var(--card)}
.pgrid{display:flex; flex-wrap:wrap; gap:7px; margin:6px 0 4px}
.pchip{border:2px solid var(--ink); background:var(--card); border-radius:999px; padding:7px 13px; font-family:var(--disp); font-size:13.5px; font-weight:700; color:var(--ink); cursor:pointer}
.pchip.on{background:var(--steel); border-color:var(--ink); color:#FFFAF0; box-shadow:2px 2px 0 var(--ink)}
.match{background:var(--card); border:2px solid var(--ink); border-radius:var(--r); box-shadow:3px 3px 0 rgba(32,36,47,.12); padding:12px 16px; margin-bottom:11px}
.match .top{display:flex; justify-content:space-between; align-items:center; cursor:pointer}
.match .pct{font-family:var(--disp); font-weight:800; color:var(--dhaniya); font-size:18px}
.match .miss{font-size:12.5px; color:var(--mirchi); margin-top:4px}
.match .have{font-size:12.5px; color:var(--dhaniya); margin-top:2px}
.frm label{display:block; font-family:var(--disp); font-size:12px; font-weight:700; letter-spacing:.5px; text-transform:uppercase; color:var(--muted); margin:13px 0 5px}
.frm input[type=text], .frm input[type=number], .frm select, .frm textarea{width:100%; border:2px solid var(--ink); border-radius:10px; padding:10px 12px; font-family:var(--body-font); font-size:15px; background:var(--card)}
.frm textarea{min-height:90px}
.frm .hint{font-size:12px; color:var(--muted); margin-top:4px}
.setrow{display:flex; justify-content:space-between; align-items:center; padding:13px 0; border-bottom:1px dashed var(--line); gap:12px}
.qgrid{display:grid; grid-template-columns:repeat(5,1fr); gap:8px; margin:8px 0}
.qgrid .qcell{text-align:center}
.qgrid .qcell label{font-family:var(--disp); font-size:11px; font-weight:700; color:var(--muted); display:block; margin-bottom:4px}
.qgrid .qcell input{width:100%; border:2px solid var(--ink); border-radius:10px; padding:8px 4px; text-align:center; font-family:var(--body-font); font-size:15px; background:var(--card)}
.toggle{width:46px;height:26px;border-radius:999px;background:var(--line);border:2px solid var(--ink);position:relative;cursor:pointer;flex-shrink:0}
.toggle.on{background:var(--dhaniya)}
.toggle::after{content:'';position:absolute;top:2px;left:2px;width:18px;height:18px;border-radius:50%;background:#fff;border:1px solid var(--ink);transition:left .15s}
.toggle.on::after{left:22px}
.legend{background:var(--card); border:2px dashed var(--ink); border-radius:var(--r); padding:14px 16px; font-size:13.5px; color:var(--muted); margin-bottom:14px}
.legend b{color:var(--ink)}
.legend .big{font-size:34px; display:block; margin-bottom:6px; animation:bob 2.6s ease-in-out infinite}
@keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
.toast{position:fixed; bottom:100px; left:50%; transform:translateX(-50%); background:var(--ink); color:var(--haldi); border:2px solid var(--haldi); padding:10px 18px; border-radius:999px; font-family:var(--disp); font-size:14px; font-weight:700; z-index:200; opacity:0; transition:opacity .2s; pointer-events:none; white-space:nowrap}
.toast.on{opacity:1}
@media (prefers-reduced-motion: reduce){ .sheet{transition:none} .toggle::after{transition:none} .day{animation:none} .legend .big{animation:none} }
</style>
</head>
<body>
<div class="wrap">
  <header class="app">
    <h1 class="brand" id="t-brand">Ghar ka Menu<span class="dot">.</span></h1>
    <div class="hbtns">
      <div class="langpill">
        <button id="lang-en" onclick="setLang('en')">EN</button>
        <button id="lang-hi" onclick="setLang('hi')">हिं</button>
      </div>
      <button class="gear" onclick="openSettings()" aria-label="Settings">⚙︎</button>
    </div>
  </header>

  <section class="page on" id="page-plan">
    <p class="sub" id="t-plansub"></p>
    <div class="btnrow">
      <button class="btn primary" id="t-genbtn" onclick="generatePlan()"></button>
      <button class="btn ghost" id="t-wabtn" onclick="openShareMenu()"></button>
      <button class="btn ghost" id="t-copybtn" onclick="copyMenu()"></button>
    </div>
    <div class="qbar" id="qbar"></div>
    <div id="plan-days"></div>
  </section>

  <section class="page" id="page-recipes">
    <div class="searchrow">
      <input type="text" id="rsearch" oninput="renderRecipes()">
      <button class="btn primary small" onclick="openAddRecipe()">+ Add</button>
    </div>
    <div class="filters" id="rfilters"></div>
    <div id="rlist"></div>
  </section>

  <section class="page" id="page-bazaar">

<script>
/* ================= STATE ================= */
const store = {
  get(k,d){ try{ const v=localStorage.getItem('gm_'+k); return v?JSON.parse(v):d }catch(e){ return d } },
  set(k,v){ try{ localStorage.setItem('gm_'+k, JSON.stringify(v)) }catch(e){} }
};
let custom = store.get('custom',[]);
let hidden = store.get('hidden',[]);
let plan = store.get('plan',null);
let grocery = store.get('grocery',{items:[]});
let pantryHave = store.get('pantry',[]);
let settings = store.get('settings',{breakfast:false, quota:{chicken:4,fish:3,beef:2,mutton:1,pork:0}, indianDinners:3, heavyDinners:2});
if(!settings.quota) settings.quota={chicken:4,fish:3,beef:2,mutton:1,pork:0};
if(settings.indianDinners===undefined) settings.indianDinners=3;
if(!store.get('seed_bfw',false)){ if(settings.breakfast===false) settings.breakfast='weekend'; store.set('seed_bfw',true); store.set('settings',settings) }
function bfOn(dateIso){ const b=settings.breakfast; if(b===true||b==='all') return true; if(b==='weekend') return isWeekend(dateIso); return false }
if(settings.heavyDinners===undefined) settings.heavyDinners=2;
let trashed = store.get('trashed',[]);
let ideasLog = store.get('ideas',[]);
let pickLog = store.get('plog',[]);
function logEvent(e){ pickLog.push(Object.assign({t:Date.now()},e)); if(pickLog.length>600) pickLog=pickLog.slice(-600); store.set('plog',pickLog) }
let taste = store.get('taste',{scores:{},stars:{}});
if(!taste.scores) taste.scores={}; if(!taste.stars) taste.stars={};
if(!store.get('seed_keema',false)){
  ['l9','bf1','n5'].forEach(id=>{ if(taste.scores[id]===undefined) taste.scores[id]=-2 });
  store.set('seed_keema',true); store.set('taste',taste);
}
// healthy nudge: soft downweight of heavy-carb dishes on fresh install
if(!store.get('seed_healthy',false)){
  // pasta/noodle/pizza/rice-heavy one-pots: gentle -1.5 (decays in ~3 weeks of normal use)
  ['d1','d2','d3','d4','d12','d16','n4','p2'].forEach(id=>{ if(!taste.scores[id]) taste.scores[id]=-1.5 });
  // high-protein, lower-carb dishes: gentle +1.5
  ['d5','d6','f3','x8','y5','y6','y7','l1','f2','y1'].forEach(id=>{ if(!taste.scores[id]) taste.scores[id]=1.5 });
  store.set('seed_healthy',true); store.set('taste',taste);
}
function bumpTaste(id,d){ taste.scores[id]=Math.max(-6,Math.min(6,(taste.scores[id]||0)+d)); store.set('taste',taste) }
function tasteWeight(id){ let w=Math.pow(1.5,(taste.scores[id]||0)); const st=taste.stars[id];
  if(st==='more') w*=6; if(st==='less') w*=0.15; return Math.max(0.03,Math.min(60,w)) }
function weightedPick(arr){ if(!arr.length) return null; let tot=0; const ws=arr.map(r=>{const w=tasteWeight(r.id);tot+=w;return w});
  let x=Math.random()*tot; for(let i=0;i<arr.length;i++){ x-=ws[i]; if(x<=0) return arr[i] } return arr[arr.length-1] }
let history = store.get('history',{});
let sideHist = store.get('sideHist',{});
lang = store.get('lang','en');


function normalizePlan(){
  if(!plan) return;
  plan.days.forEach(d=>['lunch','dinner','breakfast'].forEach(m=>{
    const sl=d[m]; if(!sl) return;
    if(sl.main && !sl.chosen){
      sl.chosen=[sl.main.id]; sl.saved=!!sl.main.locked;
      if(!sl.alts) sl.alts=[sl.main.id];
      delete sl.main;
    }
    if(!sl.chosen) sl.chosen=[];
  }));
}
function primary(sl){ return sl && (sl.chosen&&sl.chosen[0]) || (sl.alts&&sl.alts[0]) || null }
function allRecipes(){ return SEED.concat(custom) }
function activeRecipes(){ return allRecipes().filter(r=>!hidden.includes(r.id)&&!trashed.includes(r.id)) }
function byId(id){ return allRecipes().find(r=>r.id===id) }
const zoyaOK = r => ZOYA_PROTEINS.includes(r.p);
const aveerOK = r => !r.ev;
const tokenOf = p => p==='prawns'?'fish':(['paneer','egg','veg'].includes(p)?'veg':p);
const esc = s => String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
function pName(p){ return LT(PROTEIN_META[p][0]) }
function czName(c){ return lang==='hi'?(CUISINE_HI[c]||c):c }

/* ================= DATES ================= */
function iso(d){ return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0') }
function fromIso(s){ const p=s.split('-'); return new Date(+p[0],+p[1]-1,+p[2]) }
function today0(){ const d=new Date(); d.setHours(0,0,0,0); return d }
function dayDiff(s){ return Math.round((fromIso(s)-today0())/864e5) }
function fmtDate(s,lg){ const d=fromIso(s); const W=(lg||lang)==='hi'?WD_HI:WD_EN, M=(lg||lang)==='hi'?MON_HI:MON_EN; return W[d.getDay()]+' '+d.getDate()+' '+M[d.getMonth()] }
function isWeekend(s){ const g=fromIso(s).getDay(); return g===0||g===6 }
function isFamilySlot(meal,dateIso){ return meal==='dinner' || (meal==='lunch'&&isWeekend(dateIso)) }
function dayLabel(s,lg){ const d=dayDiff(s); const l=lg||lang;
  if(d===0) return l==='hi'?'आज':'Today'; if(d===1) return l==='hi'?'कल':'Tomorrow';
  return (l==='hi'?WD_HI:WD_EN)[fromIso(s).getDay()] }

/* ================= PROTEIN SCHEDULE ================= */
function shuffle(a){ a=a.slice(); for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]} return a }
function buildTokenSchedule(dates, lockedTokens){
  // lockedTokens: {slotKey: token}; slotKey = di+'-'+meal
  const q = Object.assign({chicken:0,fish:0,beef:0,mutton:0,pork:0}, settings.quota);
  // subtract locked
  Object.values(lockedTokens).forEach(t=>{ if(q[t]!==undefined && q[t]>0) q[t]-- });
  let bag=[];
  Object.entries(q).forEach(([t,n])=>{ for(let i=0;i<Math.max(0,n);i++) bag.push(t) });
  const free = dates.length*2 - Object.keys(lockedTokens).length;
  while(bag.length>free) { // over-quota: drop lowest priority first (pork, mutton, beef, fish, chicken)
    const order=['pork','mutton','beef','fish','chicken'];
    for(const t of order){ const i=bag.indexOf(t); if(i>-1 && bag.length>free){ bag.splice(i,1); break } }
  }
  while(bag.length<free) bag.push('veg');
  // red meats can only sit in unlocked weekday lunches — trim to capacity (pork → mutton → beef)
  const redCap = dates.filter((dt,di)=>!isWeekend(dt) && lockedTokens[di+'-lunch']===undefined).length;
  const redCount = ()=>bag.filter(t=>['beef','mutton','pork'].includes(t)).length;
  for(const t of ['pork','mutton','beef']){
    while(redCount()>redCap){ const i=bag.indexOf(t); if(i<0) break; bag.splice(i,1); bag.push('veg') }
  }
  const slots=[]; dates.forEach((dt,di)=>{ slots.push({di,meal:'lunch',date:dt}); slots.push({di,meal:'dinner',date:dt}) });
  for(let attempt=0; attempt<500; attempt++){
    const b=shuffle(bag); const asg={}; let okAll=true;
    const relaxDinner = attempt>250, relaxSameDay = attempt>420, relaxVegDinner = attempt>460;
    for(const s of slots){
      const key=s.di+'-'+s.meal;
      if(lockedTokens[key]!==undefined){ asg[key]=lockedTokens[key]; continue }
      const fam = isFamilySlot(s.meal,s.date);
      const red = t=>['beef','mutton','pork'].includes(t);
      let idx=-1;
      for(let i=0;i<b.length;i++){
        const t=b[i];
        const famAllowed = s.meal==='dinner' ? ['chicken','fish','veg','beef'] : ['chicken','fish','veg'];
        if(fam && !famAllowed.includes(t)) continue;
        if(t==='veg' && s.meal==='dinner' && !relaxVegDinner) continue;
        if(red(t) && !(s.meal==='lunch' && !isWeekend(s.date)) && !(t==='beef'&&s.meal==='dinner')) continue;
        const other = asg[s.di+'-'+(s.meal==='lunch'?'dinner':'lunch')];
        if(!relaxSameDay && other && other===t && t!=='veg') continue;
        if(!relaxDinner && s.meal==='dinner' && s.di>0){
          const pd = asg[(s.di-1)+'-dinner'];
          if(pd && pd===t && t!=='veg') continue;
        }
        idx=i; break;
      }
      if(idx<0){ okAll=false; break }
      asg[s.di+'-'+s.meal]=b[idx]; b.splice(idx,1);
    }
    if(okAll) return asg;
  }
  return null;
}

/* ================= MAIN PICKING ================= */
function usedRecently(id,dateIso,win){ const last=history[id]; if(!last) return false; return Math.abs((fromIso(dateIso)-fromIso(last))/864e5)<(win||8) }
function mainPool(meal,dateIso,token){
  const sundayLunch = meal==='lunch' && fromIso(dateIso).getDay()===0;
  let pool=activeRecipes().filter(r=> sundayLunch ? (r.co.includes('lunch')||r.co.includes('dinner')) : r.co.includes(meal));
  if(token) pool=pool.filter(r=>TOKEN_MATCH[token].includes(r.p));
  if(meal==='breakfast'){ pool=pool.filter(r=>aveerOK(r));
    const west=pool.filter(r=>r.cz==='Western'); if(west.length) pool=west;
    if(isWeekend(dateIso)){ const f=pool.filter(r=>r.fest||r.ef>=2); if(f.length>=2) pool=f; } }
  else if(isFamilySlot(meal,dateIso)) pool=pool.filter(r=>(zoyaOK(r)||r.zpair)&&aveerOK(r));
  return pool;
}
function pickMain(meal,dateIso,token,ctx){
  const pool=mainPool(meal,dateIso,token);
  const isInd = r=>['Indian','Goan'].includes(r.cz);
  const dow=fromIso(dateIso).getDay();
  const sundayLunch = meal==='lunch'&&dow===0;
  // special slots: Friday dinner onwards — Fri/Sat/Sun dinners, Sat & Sun lunches (Sunday lunch is the centrepiece)
  const special = (meal==='dinner'&&(dow===5||dow===6||dow===0)) || (meal==='lunch'&&(dow===6||dow===0));
  // recency window: routine weekday lunches may repeat (3d); specials stay rare (10d); default 8d
  const recWin = (meal==='lunch'&&dow>=1&&dow<=5) ? 3 : (special?10:8);
  // rhythm: weekday+Saturday lunches lean Indian (red meats exempt); Sunday lunch roams free; dinners cap Indian/week
  const rhythm = r=>{
    if(meal==='lunch') return ['beef','mutton','pork'].includes(token) || sundayLunch || isInd(r);
    if(meal==='dinner') return (ctx.indianD||0)<(settings.indianDinners??3) || !isInd(r);
    return true;
  };
  const festive = r=> !special || r.fest || r.ef>=2;
  const heavyOK = r=>!(r.ef>=3&&(ctx.dayHeavy||(meal==='dinner'&&ctx.weekHeavyD>=(settings.heavyDinners??2))));
  const isVegLunch = token==='veg'&&meal==='lunch'&&fromIso(dateIso).getDay()!==0;
  const simple1 = r=>!isVegLunch||r.ef<=1, simple2 = r=>!isVegLunch||r.ef<=2;
  const tiers=[
    r=>rhythm(r) && festive(r) && simple1(r) && !ctx.picked.includes(r.id) && !usedRecently(r.id,dateIso,recWin) && heavyOK(r),
    r=>rhythm(r) && simple2(r) && !ctx.picked.includes(r.id) && heavyOK(r),
    r=>simple2(r) && !ctx.picked.includes(r.id) && !usedRecently(r.id,dateIso,recWin) && heavyOK(r),
    r=>!ctx.picked.includes(r.id),
    r=>true
  ];
  for(const f of tiers){ const c=pool.filter(f); if(c.length) return weightedPick(c) }
  return null;
}
function pickAlternates(meal,dateIso,token,ctx,mainId){
  const alts=[mainId];
  for(let tries=0; tries<6 && alts.length<3; tries++){
    const ctx2=Object.assign({},ctx,{picked:ctx.picked.concat(alts)});
    const r=pickMain(meal,dateIso,token,ctx2);
    if(r && !alts.includes(r.id)) alts.push(r.id);
  }
  return alts;
}

/* ================= SIDES ================= */
function sideSlotsFor(main, meal){
  if(!main||meal==='breakfast') return [];
  const isInd = main.cz==='Indian'||main.cz==='Goan';
  if(main.onepot){
    // onepot Indian: raita + salad; onepot non-Indian: salad only
    return isInd ? ['raita','salad'] : ['salad'];
  }
  if(isInd){
    // Indian: dal (lunch non-dal-dish), sabzi, staple (roti/rice — mandatory), raita (mandatory), salad (mandatory)
    const t=['sabzi','staple','salad','raita'];
    if(meal==='lunch' && !main.isDal) t.unshift('dal');
    return t;
  }
  // non-Indian, non-onepot: always include salad; add raita if family meal
  return meal==='dinner' ? ['salad'] : ['salad'];
}
function pickSide(type, avoid){
  const opts=sidesOf(type); if(!opts.length) return null;
  const recent=sideHist[type]||[];
  const c=shuffle(opts.filter(s=>!avoid.includes(s.id) && !recent.slice(-2).includes(s.id)));
  const pick=(c[0]||shuffle(opts.filter(s=>!avoid.includes(s.id)))[0]||opts[0]);
  sideHist[type]=(recent.concat(pick.id)).slice(-4);
  return pick.id;
}
function assignSides(main, meal, dayAvoid){
  const out={};
  sideSlotsFor(main,meal).forEach(t=>{ out[t]=pickSide(t, dayAvoid); if(out[t]) dayAvoid.push(out[t]) });
  return out;
}

/* ================= GENERATE PLAN ================= */
function generatePlan(){
  Object.keys(taste.scores).forEach(k=>{ taste.scores[k]*=0.93; if(Math.abs(taste.scores[k])<0.2) delete taste.scores[k] });
  store.set('taste',taste);
  const start=today0(); const old=plan;
  const dates=[]; for(let i=0;i<7;i++) dates.push(iso(new Date(start.getFullYear(),start.getMonth(),start.getDate()+i)));
  // collect locked slots
  const lockedTokens={}, lockedData={};
  if(old){ plan=old; normalizePlan(); }
  if(old) dates.forEach((dt,di)=>{
    const od=old.days.find(x=>x.date===dt); if(!od) return;
    ['lunch','dinner'].forEach(m=>{
      const sl=od[m];
      if(sl&&sl.saved&&sl.skipped){
        lockedTokens[di+'-'+m]='veg'; // consumes nothing meaningful; slot preserved
        lockedData[di+'-'+m]=sl;
      } else if(sl&&sl.saved&&sl.chosen&&sl.chosen.length&&byId(sl.chosen[0])){
        lockedTokens[di+'-'+m]=tokenOf(byId(sl.chosen[0]).p);
        lockedData[di+'-'+m]=sl;
      }
    });
  });
  const sched=buildTokenSchedule(dates,lockedTokens);
  if(!sched){ toast(LT('noAlt')); return }
  const days=[]; const ctx={picked:[],weekHeavyD:0,indianD:0};
  sideHist={};
  dates.forEach((dt,di)=>{
    const day={date:dt}; ctx.dayHeavy=false; const dayAvoid=[];
    if(bfOn(dt)){
      const ob=old&&old.days.find(x=>x.date===dt);
      if(ob&&ob.breakfast&&ob.breakfast.saved&&ob.breakfast.chosen&&byId(ob.breakfast.chosen[0])) day.breakfast=ob.breakfast;
      else{ const b=pickMain('breakfast',dt,null,ctx); if(b) day.breakfast={chosen:[b.id],saved:false,alts:[b.id]} }
      if(day.breakfast&&day.breakfast.chosen[0]){ ctx.picked.push(day.breakfast.chosen[0]); if(byId(day.breakfast.chosen[0]).ef>=3) ctx.dayHeavy=true }
    }
    ['lunch','dinner'].forEach(m=>{
      const key=di+'-'+m;
      if(lockedData[key]){ day[m]=lockedData[key]; }
      else{
        const tok=sched[key];
        const r=pickMain(m,dt,tok,ctx);
        if(r) day[m]={chosen:[r.id], saved:false, token:tok, sides:assignSides(r,m,dayAvoid), alts:pickAlternates(m,dt,tok,ctx,r.id)};
      }
      if(day[m]&&byId(primary(day[m]))){
        const r=byId(primary(day[m]));
        ctx.picked.push(r.id);
        if(r.ef>=3){ ctx.dayHeavy=true; if(m==='dinner') ctx.weekHeavyD++ }
        if(m==='dinner'&&['Indian','Goan'].includes(r.cz)) ctx.indianD++;
        Object.values(day[m].sides||{}).forEach(s=>dayAvoid.push(s));
      }
    });
    days.push(day);
  });
  plan={start:iso(start),days};
  store.set('plan',plan); store.set('sideHist',sideHist);
  days.forEach(d=>['breakfast','lunch','dinner'].forEach(m=>{ if(d[m]&&primary(d[m])) history[primary(d[m])]=d.date }));
  store.set('history',history);
  renderPlan(); toast(LT('planReady'));
}
function slotCtx(day,meal){
  return {picked:plan.days.flatMap(d=>['breakfast','lunch','dinner'].map(m=>d[m]&&primary(d[m])).filter(Boolean)),
    dayHeavy:['breakfast','lunch','dinner'].some(m=>m!==meal&&day[m]&&byId(primary(day[m]))&&byId(primary(day[m])).ef>=3),
    weekHeavyD:plan.days.filter(d=>d.dinner&&byId(primary(d.dinner))&&byId(primary(d.dinner)).ef>=3&&d!==day).length,
    indianD:plan.days.filter(d=>d!==day&&d.dinner&&byId(primary(d.dinner))&&['Indian','Goan'].includes(byId(primary(d.dinner)).cz)).length};
}
function swapSlot(di,meal){
  const day=plan.days[di]; const slot=day[meal]; if(!slot) return;
  const tok=slot.token||tokenOf(byId(primary(slot)).p);
  const ctx=slotCtx(day,meal);
  const r=pickMain(meal,day.date,meal==='breakfast'?null:tok,ctx);
  if(!r){ toast(LT('noAlt')); return }
  if(primary(slot)) bumpTaste(primary(slot),-1);
  if(meal!=='breakfast'&&slot.alts&&slot.alts.length) logEvent({k:'rej',d:day.date,m:meal,r:slot.alts.slice()});
  const dayAvoid=Object.values((day.lunch&&day.lunch.sides)||{}).concat(Object.values((day.dinner&&day.dinner.sides)||{}));
  day[meal]= meal==='breakfast' ? {chosen:[r.id],saved:false,alts:[r.id]} : {chosen:[r.id], saved:false, token:tok, sides:assignSides(r,meal,dayAvoid), alts:pickAlternates(meal,day.date,tok,ctx,r.id)};
  store.set('plan',plan); store.set('sideHist',sideHist); renderPlan();
}
function trashDish(id){
  if(trashed.includes(id)) return;
  trashed.push(id); store.set('trashed',trashed);
  logEvent({k:'trash',r:[id]});
  delete taste.stars[id]; delete taste.scores[id]; store.set('taste',taste);
  // sweep dish out of unsaved slots
  if(plan) plan.days.forEach((d,di)=>['lunch','dinner'].forEach(m=>{
    const sl=d[m]; if(!sl||sl.saved) return;
    if(sl.alts&&sl.alts.includes(id)){
      const tok=sl.token||(primary(sl)&&tokenOf(byId(primary(sl)).p));
      const ctx=slotCtx(d,m); ctx.picked=ctx.picked.concat(sl.alts);
      const r=pickMain(m,d.date,tok,ctx);
      const i=sl.alts.indexOf(id);
      if(r&&!sl.alts.includes(r.id)) sl.alts[i]=r.id; else sl.alts.splice(i,1);
      const ci=sl.chosen.indexOf(id); if(ci>=0) sl.chosen.splice(ci,1);
      if(!sl.chosen.length&&sl.alts.length) sl.chosen=[sl.alts[0]];
    }
  }));
  store.set('plan',plan);
  closeSheet(); renderAll();
  toast(trashed.length>=10 ? LT('trashFull').replace('{n}',trashed.length) : LT('trashToast').replace('{n}',trashed.length));
}
function restoreDish(id){
  trashed=trashed.filter(x=>x!==id); store.set('trashed',trashed);
  logEvent({k:'restore',r:[id]});
  closeSheet(); renderAll(); toast(LT('restored2'));
}
function likeDish(id,reopen){
  if(taste.stars[id]==='more') delete taste.stars[id]; else taste.stars[id]='more';
  logEvent({k:taste.stars[id]==='more'?'like':'unlike',r:[id]});
  store.set('taste',taste);
  if(reopen) openRecipe(id);
}
function refreshOption(di,meal,id){
  const day=plan.days[di], slot=day[meal]; if(!slot||slot.saved) return;
  const tok=slot.token||tokenOf(byId(primary(slot)).p);
  const ctx=slotCtx(day,meal);
  ctx.picked=ctx.picked.concat(slot.alts);
  const r=pickMain(meal,day.date,tok,ctx);
  if(!r||slot.alts.includes(r.id)){ toast(LT('noAlt')); return }
  bumpTaste(id,-1);
  logEvent({k:'rej',d:day.date,m:meal,r:[id]});
  const i=slot.alts.indexOf(id);
  if(i>=0) slot.alts[i]=r.id;
  const ci=slot.chosen.indexOf(id);
  if(ci>=0) slot.chosen.splice(ci,1);
  if(!slot.chosen.length) slot.chosen=[slot.alts[0]];
  store.set('plan',plan); renderPlan();
}
function openIdeaSheet(di,meal){
  const day=plan.days[di];
  openSheetHtml(`<h2>${LT('ideaTitle')} ${dayLabel(day.date)} ${LT(meal)}</h2>
  <div class="hint" style="font-size:12.5px;color:var(--muted);margin:6px 0 10px">${LT('ideaNote')}</div>
  <div class="addrow"><input type="text" id="idea-in" placeholder="${LT('ideaPh')}">
  <button class="btn primary small" onclick="addIdea(${di},'${meal}')">${LT('addBtn')}</button></div>`);
  setTimeout(()=>{const el=document.getElementById('idea-in'); if(el) el.focus()},250);
}
function addIdea(di,meal){
  const v=(document.getElementById('idea-in').value||'').trim();
  if(!v) return;
  const slot=plan.days[di][meal];
  slot.ideas=slot.ideas||[]; slot.ideas.push(v);
  ideasLog.push({t:Date.now(), d:plan.days[di].date, m:meal, x:v});
  if(ideasLog.length>300) ideasLog=ideasLog.slice(-300);
  store.set('ideas',ideasLog); store.set('plan',plan);
  closeSheet(); renderPlan();
}
function removeIdea(di,meal,i){
  const slot=plan.days[di][meal];
  if(slot.ideas) slot.ideas.splice(i,1);
  store.set('plan',plan); renderPlan();
}
function toggleDish(di,meal,id){
  const slot=plan.days[di][meal]; if(!slot||slot.saved) return;
  const i=slot.chosen.indexOf(id);
  if(i>=0) slot.chosen.splice(i,1); else slot.chosen.push(id);
  store.set('plan',plan); renderPlan();
}
function saveMeal(di,meal){
  const day=plan.days[di], slot=day[meal]; if(!slot) return;
  if(!slot.chosen.length && !(slot.ideas||[]).length){ toast(LT('pickOne')); return }
  slot.saved=true;
  const notes=[];
  const dayAvoid=Object.values((day.lunch&&day.lunch.sides)||{}).concat(Object.values((day.dinner&&day.dinner.sides)||{}));
  if(slot.chosen.length) slot.sides=assignSides(byId(slot.chosen[0]),meal,dayAvoid);
  else slot.sides=slot.sides||{salad:pickSide('salad',dayAvoid)};
  logEvent({k:'pick',d:day.date,m:meal,c:slot.chosen.slice(),o:(slot.alts||[]).slice(),i:(slot.ideas||[]).slice()});
  slot.chosen.forEach(id=>{
    bumpTaste(id,2);
    const last=history[id];
    if(last && last!==day.date){
      const dd=Math.round(Math.abs((fromIso(day.date)-fromIso(last))/864e5));
      if(dd>0&&dd<=4) notes.push(LT('repeatWarn').replace('{d}',dd));
    }
    history[id]=day.date;
  });
  // dedupe: chosen dishes appearing in other UNSAVED slots get re-dealt
  let moved=false;
  plan.days.forEach((d2,j)=>['lunch','dinner'].forEach(m2=>{
    if(j===di&&m2===meal) return;
    const s2=d2[m2]; if(!s2||s2.saved) return;
    const overlap=s2.chosen.filter(c=>slot.chosen.includes(c));
    if(overlap.length){
      const tok2=s2.token||tokenOf(byId(primary(s2)).p);
      const ctx2=slotCtx(d2,m2);
      const r2=pickMain(m2,d2.date,tok2,ctx2);
      if(r2&&!slot.chosen.includes(r2.id)){
        s2.chosen=[r2.id]; s2.alts=pickAlternates(m2,d2.date,tok2,ctx2,r2.id); moved=true;
      }
    }
    if(s2.alts) s2.alts=s2.alts.filter(a=>!slot.chosen.includes(a)||s2.chosen.includes(a));
  }));
  if(moved) notes.push(LT('movedDup'));
  toast(notes.length?notes.join(' · '):LT('mealSaved'));
  store.set('plan',plan); store.set('history',history); store.set('sideHist',sideHist);
  renderPlan();
}
function changeMeal(di,meal){
  const slot=plan.days[di][meal]; if(!slot) return;
  slot.saved=false; slot.skipped=false;
  if(!(slot.alts||[]).length){ swapSlot(di,meal); return }
  store.set('plan',plan); renderPlan();
}
function skipMeal(di,meal){
  const slot=plan.days[di][meal]; if(!slot) return;
  slot.skipped=true; slot.saved=true;
  logEvent({k:'skip',d:plan.days[di].date,m:meal});
  store.set('plan',plan); renderPlan(); toast(LT('skippedToast'));
}

function setSlot(dateIso,meal,id){
  if(!plan||dayDiff(plan.start)<-6){ generatePlan(); }
  const day=plan.days.find(d=>d.date===dateIso);
  if(!day){ toast(LT('notInPlan')); return }
  const r=byId(id);
  const dayAvoid=Object.values((day.lunch&&day.lunch.sides)||{}).concat(Object.values((day.dinner&&day.dinner.sides)||{}));
  const ctxS=slotCtx(day,meal);
  day[meal]= meal==='breakfast' ? {chosen:[id],saved:true,alts:[id]} : {chosen:[id], saved:true, token:tokenOf(r.p), sides:assignSides(r,meal,dayAvoid), alts:pickAlternates(meal,day.date,tokenOf(r.p),ctxS,id)};
  bumpTaste(id,3); history[id]=day.date; store.set('history',history);
  store.set('plan',plan); store.set('sideHist',sideHist); renderPlan(); closeSheet();
  goTab('plan',document.querySelector('[data-page=plan]'));
  toast(L(r.n)+' '+LT('setDone'));
}

function quotaBar(){
  const el=document.getElementById('qbar');
  if(!plan){ el.style.display='none'; return }
  el.style.display='flex';
  const count={chicken:0,fish:0,beef:0,mutton:0,pork:0,veg:0};
  plan.days.forEach(d=>['lunch','dinner'].forEach(m=>{ const sl=d[m]; if(!sl||sl.skipped) return; const p=primary(sl); if(p&&byId(p)) count[tokenOf(byId(p).p)]++ }));
  let h='';
  ['chicken','fish','beef','mutton','pork'].forEach(t=>{
    const tgt=settings.quota[t]||0; const c=count[t];
    const meta=PROTEIN_META[t==='fish'?'fish':t];
    const dots=Array.from({length:Math.max(tgt,c)},(_,i)=>`<i class="${i<c?'f':''}"></i>`).join('');
    h+=`<span class="qi ${c>tgt?'over':(c===tgt?'met':'')}"><span class="pdot" style="background:${meta[1]};border-color:transparent"></span>${pName(t==='fish'?'fish':t)} ${c}/${tgt}<span class="meter">${dots}</span></span>`;
  });

  el.innerHTML=h;
}

  return [
    warn?`<span class="chip warn" style="font-size:10px;padding:2px 7px">${!zoyaOK(r)?'✗ Zoya':'✗ Aveer'}</span>`:'',
    zp?`<span class="chip haldi" style="font-size:10px;padding:2px 7px">${LT('zoyaPair')}</span>`:'',
    vegLunch?`<span class="chip haldi" style="font-size:10px;padding:2px 7px">${LT('tikkaAddon')}</span>`:''

}

/* ================= SHARE ================= */
function Lx(x,lg){ return Array.isArray(x)?(x[lg==='hi'?1:0]||x[0]):x }
function menuText(lg){
  if(!plan) return '';
  let t=Lx(T.menuTitle,lg)+' — '+fmtDate(plan.start,lg)+' '+Lx(T.from,lg)+'\n';
  plan.days.forEach(d=>{
    t+='\n*'+dayLabel(d.date,lg)+' ('+fmtDate(d.date,lg)+')*\n';
    if(bfOn(d.date)&&d.breakfast&&byId(primary(d.breakfast))){
      const bn=[Lx(byId(primary(d.breakfast)).n,lg)].concat((d.breakfast.ideas||[]).map(x=>'✱ '+x));
      t+='☕ '+Lx(T.breakfast,lg)+': '+bn.join(' + ')+'\n';
    }
    ['lunch','dinner'].forEach(m=>{
      const sl=d[m]; if(!sl) return;
      const pre=(m==='lunch'?'🥗 ':'🍛 ')+Lx(T[m],lg)+': ';
      if(sl.skipped){ t+=pre+Lx(T.skippedWA,lg)+'\n'; return }
      if(!sl.saved||!sl.chosen.length){ t+=pre+Lx(T.notDecided,lg)+'\n'; return }
      const names=sl.chosen.map(id=>byId(id)?Lx(byId(id).n,lg):'').filter(Boolean)
        .concat((sl.ideas||[]).map(x=>'✱ '+x));
      const flags=[];
      sl.chosen.forEach(id=>{
        const r=byId(id); if(!r) return;
        if(m==='lunch'&&tokenOf(r.p)==='veg'&&!flags.includes('vl')) flags.push('vl');
        if((m==='dinner'||(m==='lunch'&&isWeekend(d.date)))&&r.zpair&&!ZOYA_PROTEINS.includes(r.p)&&!flags.includes('zp')) flags.push('zp');
      });
      t+=pre+names.join(' + ')
        +(flags.includes('vl')?' ('+Lx(T.tikkaAddon,lg).replace('+ ','')+')':'')
        +(flags.includes('zp')?' ('+Lx(T.zoyaPair,lg).replace('+ ','')+')':'')+'\n';
      const sd=Object.values(sl.sides||{}).map(id=>sideById(id)?Lx(sideById(id).n,lg):'').filter(Boolean);
      if(sd.length) t+='    ('+sd.join(', ')+')\n';
    });
  });
  return t;
}
function waUrl(lg,text){ return 'https://wa.me/?text='+encodeURIComponent(text) }
function shareWhatsApp(lg){ const t=menuText(lg); if(!t){toast(LT('firstPlan'));return} closeSheet(); window.open(waUrl(lg,t),'_blank') }

    <button class="btn primary" style="padding:14px" onclick="${fn}('hi')">${LT('waCook')}</button>
    <button class="btn ghost" style="padding:14px" onclick="${fn}('en')">${LT('waGauri')}</button>

}
function openShareMenu(){ if(!plan){toast(LT('firstPlan'));return} shareChooser(LT('shareTitle'),'shareWhatsApp') }
function openShareGrocery(){ if(!grocery.items.filter(i=>!i.checked).length){toast(LT('allTicked'));return} shareChooser(LT('shareListTitle'),'shareGrocery') }
function copyMenu(){ const t=menuText(lang); if(!t){toast(LT('firstPlan'));return} navigator.clipboard.writeText(t).then(()=>toast(LT('copied'))) }
function recipeText(r,lg){
  let t='👨‍🍳 *'+Lx(r.n,lg)+'* ('+(lg==='hi'?(CUISINE_HI[r.cz]||r.cz):r.cz)+', ~'+r.tm+' '+Lx(T.min,lg)+')\n\n*'+Lx(T.ingredients,lg)+':*\n';
  r.ing.forEach(g=>t+='• '+Lx([g[0],g[1]],lg)+(g[2]?' — '+g[2]:'')+'\n');
  t+='\n*'+Lx(T.method,lg)+':*\n'; r.st.forEach((s,i)=>t+=(i+1)+'. '+Lx(s,lg)+'\n');

}

<script>
/* ================= SHEET ================= */
function openSheetHtml(h){
  const sh=document.getElementById('sheet');
  sh.innerHTML='<button class="closex" onclick="closeSheet()">✕</button>'+h;
  document.getElementById('sheetbg').classList.add('on');
  (window.requestAnimationFrame||setTimeout)(()=>sh.classList.add('on'));
  sh.scrollTop=0;
}
function closeSheet(){
  document.getElementById('sheet').classList.remove('on');
  document.getElementById('sheetbg').classList.remove('on');
}

/* ================= RECIPES TAB ================= */
let rFilter='all';
const FILTERS=[['all','all'],['breakfast','breakfast'],['lunch','lunch'],['dinner','dinner'],['zoya','zoyaF'],['aveer','aveerF'],
 ['Indian',null],['Goan',null],['Italian',null],['Western',null],['Japanese',null],['Chinese',null],['Thai',null],['Mexican',null]];
function renderFilters(){
  document.getElementById('rfilters').innerHTML=FILTERS.map(([k,tk])=>{
    const label = tk ? LT(tk) : czName(k);
    return `<button class="fchip ${rFilter===k?'on':''}" onclick="rFilter='${k}';renderFilters();renderRecipes()">${label}</button>`;
  }).join('');
}
function renderRecipes(){
  const q=(document.getElementById('rsearch').value||'').toLowerCase();
  let list=allRecipes();
  if(rFilter==='zoya') list=list.filter(zoyaOK);
  else if(rFilter==='aveer') list=list.filter(aveerOK);
  else if(['breakfast','lunch','dinner'].includes(rFilter)) list=list.filter(r=>r.co.includes(rFilter));
  else if(rFilter!=='all') list=list.filter(r=>r.cz===rFilter);
  if(q) list=list.filter(r=>(r.n[0]+' '+r.n[1]+' '+r.p+' '+r.cz).toLowerCase().includes(q));
  const dim=r=>hidden.includes(r.id)||trashed.includes(r.id);
  list.sort((a,b)=>(dim(a)?1:0)-(dim(b)?1:0));
  document.getElementById('rlist').innerHTML = list.length? list.map(r=>{
    const pm=PROTEIN_META[r.p];
    return `<div class="rcard ${(hidden.includes(r.id)||trashed.includes(r.id))?'hiddenr':''}" onclick="openRecipe('${r.id}')">
      <div class="info"><div class="nm">${esc(L(r.n))}</div>
      <div class="mt"><span class="pdot" style="background:${pm[1]}"></span>${pName(r.p)} · ${czName(r.cz)} · ${r.tm} ${LT('min')} · <span class="flames">${'🧑‍🍳'.repeat(r.ef)}</span>${r.kc?` · ~${r.kc} kcal`:''}</div></div>
      <div class="kidflags"><span class="${zoyaOK(r)?'ok':'no'}">${zoyaOK(r)?'✓':'✗'} Zoya</span><span class="${aveerOK(r)?'ok':'no'}">${aveerOK(r)?'✓':'✗'} Aveer</span></div>
    </div>`;
  }).join('') : `<div class="legend">${LT('notFound')}</div>`;
}
function openRecipe(id){
  const r=byId(id); if(!r) return;
  const isCustom=custom.some(c=>c.id===id);
  const dayOpts = plan? plan.days.map(d=>`<option value="${d.date}">${dayLabel(d.date)} (${fmtDate(d.date)})</option>`).join('') : '';
  let h=`<h2>${esc(L(r.n))}</h2>
  <div class="badges">
    <span class="chip cuisine">${czName(r.cz)}</span><span class="chip">${pName(r.p)}</span>
    <span class="chip haldi">${r.tm} ${LT('min')} · ${LT('effort'+r.ef)}</span>
    ${r.kc?`<span class="chip">~${r.kc} kcal / serving</span>`:''}
    ${zoyaOK(r)?'':`<span class="chip warn">✗ Zoya</span>`}${aveerOK(r)?'':`<span class="chip warn">✗ Aveer (${lang==='hi'?'अंडा':'egg'})</span>`}
  </div>`;
  if(r.gn) h+=`<div class="note">💡 ${esc(L(r.gn))}</div>`;
  if(!zoyaOK(r)) h+=`<div class="note">${LT('zoyaNote')}</div>`;
  h+=`<h3>${LT('ingredients')}</h3>`;
  r.ing.forEach(g=>h+=`<div class="ingline"><span>${esc(L([g[0],g[1]]))}</span><span>${esc(g[2]||'')}</span></div>`);
  h+=`<h3>${LT('method')}</h3>`;
  r.st.forEach((s,i)=>h+=`<div class="stepline"><span class="n">${i+1}</span><span>${esc(L(s))}</span></div>`);
  if(plan) h+=`<h3>${LT('addToPlan')}</h3>
  <div style="display:flex;gap:8px">
    <select id="ap-day" style="flex:1;border:1.5px solid var(--line);border-radius:10px;padding:9px;font-family:var(--body-font);background:#fff">${dayOpts}</select>
    <select id="ap-meal" style="flex:1;border:1.5px solid var(--line);border-radius:10px;padding:9px;font-family:var(--body-font);background:#fff">
      ${r.co.map(c=>`<option value="${c}">${LT(c)}</option>`).join('')}</select>
    <button class="btn primary small" onclick="setSlot(document.getElementById('ap-day').value,document.getElementById('ap-meal').value,'${r.id}')">${LT('set')}</button>
  </div>`;
  const st=taste.stars[r.id]||'';
  const isTrashed=trashed.includes(r.id);
  h+=`<h3>${LT('tasteHead')}</h3><div class="pgrid">
    <button class="pchip ${st==='more'?'on':''}" onclick="likeDish('${r.id}',true)">${LT('like')}</button>
    <button class="pchip ${st==='less'?'on':''}" onclick="setStar('${r.id}',${JSON.stringify('less')});openRecipe('${r.id}')">👎 ${LT('likeLess')}</button>
    ${isTrashed
      ?`<button class="pchip" style="background:var(--dhaniya);color:#fff;border-color:var(--ink)" onclick="restoreDish('${r.id}')">${LT('restoreDish')}</button>`
      :`<button class="pchip" style="color:var(--mirchi)" onclick="trashDish('${r.id}')">${LT('trash')}</button>`}
  </div>`;
  h+=`<div class="btnrow" style="margin-top:16px">
    <button class="btn ghost small" onclick="shareRecipe('${r.id}')">${LT('sendRecipe')}</button>
    ${isCustom?`<button class="btn ghost small" onclick="openAddRecipe('${r.id}')">${LT('edit')}</button>
    <button class="btn ghost small" onclick="deleteRecipe('${r.id}')">${LT('del')}</button>`
    :`<button class="btn ghost small" onclick="toggleHide('${r.id}')">${hidden.includes(r.id)?LT('unhide'):LT('hide')}</button>`}
  </div>`;
  openSheetHtml(h);
}
function setStar(id,v){ if(v&&taste.stars[id]!==v) taste.stars[id]=v; else delete taste.stars[id]; store.set('taste',taste) }
function tasteRank(id){ const st=taste.stars[id]; return (taste.scores[id]||0) + (st==='more'?4:st==='less'?-4:0) }
function toggleHide(id){
  if(hidden.includes(id)) hidden=hidden.filter(x=>x!==id); else hidden.push(id);
  store.set('hidden',hidden); closeSheet(); renderRecipes(); toast(hidden.includes(id)?LT('hid'):LT('unhid'));
}
function deleteRecipe(id){
  if(!confirm(LT('delConfirm'))) return;
  custom=custom.filter(c=>c.id!==id); store.set('custom',custom);
  closeSheet(); renderRecipes(); toast(LT('deleted'));
}
/* --- add/edit (single-language input, stored duplicated) --- */
function openAddRecipe(editId){
  const r=editId?byId(editId):null;
  const cuisines=['Indian','Goan','Italian','Western','Japanese','Chinese','Thai','Mexican','Other'];
  const prots=['chicken','fish','prawns','mutton','beef','pork','egg','paneer','veg'];
  let h=`<h2>${r?LT('editRecipe'):LT('newRecipe')}</h2><div class="frm">
  <label>${LT('fName')}</label><input type="text" id="f-n" value="${r?esc(L(r.n)):''}">
  <label>${LT('fCuisine')}</label><select id="f-cz">${cuisines.map(c=>`<option ${r&&r.cz===c?'selected':''} value="${c}">${czName(c)}</option>`).join('')}</select>
  <label>${LT('fProtein')}</label><select id="f-p">${prots.map(p=>`<option ${r&&r.p===p?'selected':''} value="${p}">${pName(p)}</option>`).join('')}</select>
  <label>${LT('fWhen')}</label>
  <div class="pgrid">${['breakfast','lunch','dinner'].map(c=>`<button class="pchip ${r&&r.co.includes(c)?'on':''}" data-co="${c}" onclick="this.classList.toggle('on')">${LT(c)}</button>`).join('')}</div>
  <label>${LT('fEffort')}</label><select id="f-ef">${[1,2,3].map(e=>`<option ${r&&r.ef===e?'selected':''} value="${e}">${'🧑‍🍳'.repeat(e)} ${LT('effort'+e)}</option>`).join('')}</select>
  <label>${LT('fTime')}</label><input type="number" id="f-tm" value="${r?r.tm:30}">
  <label>kcal / serving (optional)</label><input type="number" id="f-kc" value="${r&&r.kc?r.kc:''}">
  <label style="display:flex;align-items:center;gap:8px;text-transform:none"><input type="checkbox" id="f-ev" style="width:18px;height:18px" ${r&&r.ev?'checked':''}> ${LT('fEgg')}</label>
  <label>${LT('fIng')}</label><textarea id="f-ing">${r?r.ing.map(g=>L([g[0],g[1]])+(g[2]?' | '+g[2]:'')+(g[3]?' | '+g[3]:'')).join('\n'):''}</textarea>
  <div class="hint">${LT('fHint')}</div>
  <label>${LT('fSteps')}</label><textarea id="f-st">${r?r.st.map(s=>L(s)).join('\n'):''}</textarea>
  <div class="btnrow" style="margin-top:16px"><button class="btn primary" onclick="saveRecipe('${editId||''}')">${LT('save')}</button></div></div>`;
  openSheetHtml(h);
}
function saveRecipe(editId){
  const n=document.getElementById('f-n').value.trim();
  if(!n){ toast(LT('nameFirst')); return }
  const co=[...document.querySelectorAll('[data-co].on')].map(b=>b.dataset.co);
  if(!co.length){ toast(LT('pickMeal')); return }
  const ing=document.getElementById('f-ing').value.split('\n').map(l=>l.trim()).filter(Boolean).map(l=>{
    const p=l.split('|').map(x=>x.trim()); return [p[0],p[0],p[1]||'',(p[2]||'pantry').toLowerCase()];
  });
  const st=document.getElementById('f-st').value.split('\n').map(l=>l.trim()).filter(Boolean).map(s=>[s,s]);
  const rec={ id:editId||('c'+Date.now()), n:[n,n], cz:document.getElementById('f-cz').value,
    p:document.getElementById('f-p').value, co, ef:+document.getElementById('f-ef').value,
    tm:+document.getElementById('f-tm').value||30, kc:+document.getElementById('f-kc').value||undefined, ev:document.getElementById('f-ev').checked, needs:[], ing, st,
    onepot: !['Indian','Goan'].includes(document.getElementById('f-cz').value) ? false : false };
  if(editId) custom=custom.map(c=>c.id===editId?rec:c); else custom.push(rec);
  store.set('custom',custom); closeSheet(); renderRecipes(); toast(LT('saved'));
}

/* ================= BAZAAR ================= */
const CAT_KEYS={meat:'catMeat',veg:'catVeg',dairy:'catDairy',pantry:'catPantry',bakery:'catBakery'};
function buildGrocery(){
  if(!plan){ toast(LT('firstPlan')); return }
  const map={};
  const addItem=(en,hi,q,c)=>{
    const k=en.toLowerCase();
    if(!map[k]) map[k]={en,hi,q:[],c:c||'pantry',checked:false};
    if(q) map[k].q.push(q);
  };
  let vegLunches=0;
  plan.days.forEach(d=>['breakfast','lunch','dinner'].forEach(m=>{
    const slot=d[m]; if(!slot) return;
    if(m!=='breakfast'&&!slot.saved) return; // not decided → nothing to shop yet
    if(slot.skipped) return;
    (slot.chosen||[]).forEach(cid=>{
      const r=byId(cid); if(!r) return;
      if(m==='lunch' && tokenOf(r.p)==='veg') vegLunches++;
      r.ing.forEach(g=>addItem(g[0],g[1],g[2],g[3]));
    });
    Object.values(slot.sides||{}).forEach(id=>{ const s=sideById(id); if(s&&s.buy&&s.buy[0]) addItem(s.buy[0],s.buy[1],s.buy[2],s.buy[3]) });
  }));
  if(vegLunches) addItem('Chicken boneless (tikka add-on)','बोनलेस चिकन (टिक्का के लिए)',(350*vegLunches)+' g','meat');
  let zpairs=0;
  plan.days.forEach(d=>['lunch','dinner'].forEach(m=>{
    const slot=d[m]; if(!slot||!slot.saved||slot.skipped) return;
    (slot.chosen||[]).forEach(cid=>{
      const r=byId(cid); if(!r) return;
      if((m==='dinner'||(m==='lunch'&&isWeekend(d.date))) && r.zpair && !ZOYA_PROTEINS.includes(r.p)) zpairs++;
    });
  }));
  if(zpairs) addItem('Chicken breast / fish fillet (for Zoya)','चिकन ब्रेस्ट / मछली (ज़ोया के लिए)',(250*zpairs)+' g','meat');
  const manual=grocery.items.filter(i=>i.manual&&!i.checked);
  grocery={items:Object.values(map).map(i=>({en:i.en,hi:i.hi,q:[...new Set(i.q)].join(' + '),c:i.c,checked:false})).concat(manual)};
  store.set('grocery',grocery); renderGrocery(); toast(LT('listReady'));
}
function renderGrocery(){
  const el=document.getElementById('glist');
  if(!grocery.items.length){ el.innerHTML=`<div class="legend">${LT('listEmpty')}</div>`; return }
  let h='';
  Object.entries(CAT_KEYS).forEach(([c,tk])=>{
    const items=grocery.items.map((it,i)=>({it,i})).filter(x=>x.it.c===c);
    if(!items.length) return;
    h+=`<div class="gsec"><h3>${LT(tk)}</h3>`+items.map(({it,i})=>
      `<div class="gitem ${it.checked?'done':''}"><input type="checkbox" ${it.checked?'checked':''} onchange="toggleG(${i})" id="g${i}"><label for="g${i}">${esc(lang==='hi'?(it.hi||it.en):it.en)}</label><span class="q">${esc(it.q||'')}</span></div>`).join('')+'</div>';
  });
  el.innerHTML=h;
}
function toggleG(i){ grocery.items[i].checked=!grocery.items[i].checked; store.set('grocery',grocery); renderGrocery() }
function addGroceryItem(){
  const inp=document.getElementById('gadd'); const v=inp.value.trim(); if(!v) return;
  grocery.items.push({en:v,hi:v,q:'',c:'pantry',checked:false,manual:true});
  store.set('grocery',grocery); inp.value=''; renderGrocery();
}
function groceryText(lg){
  const left=grocery.items.filter(i=>!i.checked);
  if(!left.length) return '';
  let t='🧺 *'+(lg==='hi'?'बाज़ार की लिस्ट':'Bazaar list')+'*\n';
  Object.entries(CAT_KEYS).forEach(([c])=>{
    const items=left.filter(i=>i.c===c); if(!items.length) return;
    t+='\n*'+Lx(T[CAT_KEYS[c]],lg)+'*\n';
    items.forEach(i=>t+='◻ '+(lg==='hi'?(i.hi||i.en):i.en)+(i.q?' — '+i.q:'')+'\n');
  });
  return t;
}
function shareGrocery(lg){
  const t=groceryText(lg);
  if(!t){ toast(LT('allTicked')); return }
  closeSheet(); window.open(waUrl(lg,t),'_blank');
}

/* ================= TONIGHT ================= */
const PANTRY=[
 ['grpProtein',[['chicken',['Chicken','चिकन']],['chicken-breast',['Chicken breast','चिकन ब्रेस्ट']],['chicken-keema',['Chicken keema','चिकन कीमा']],['fish',['Fish','मछली']],['prawns',['Prawns','झींगे']],['mutton',['Mutton','मटन']],['keema',['Mutton keema','मटन कीमा']],['beef',['Beef','बीफ़']],['beef-keema',['Beef keema','बीफ़ कीमा']],['pork',['Pork / sausages','पोर्क / सॉसेज']],['eggs',['Eggs','अंडे']],['paneer',['Paneer','पनीर']],['bacon',['Bacon/ham','बेकन/हैम']]]],
 ['grpSabzi',[['onions',['Onions','प्याज़']],['tomatoes',['Tomatoes','टमाटर']],['potatoes',['Potatoes','आलू']],['capsicum',['Capsicum','शिमला मिर्च']],['spinach',['Spinach','पालक']],['fruit',['Fruit','फल']]]],
 ['grpPantry',[['rice',['Rice','चावल']],['pasta',['Pasta','पास्ता']],['noodles',['Noodles','नूडल्स']],['atta',['Atta','आटा']],['maida',['Maida','मैदा']],['besan',['Besan','बेसन']],['poha',['Poha','पोहा']],['rajma',['Rajma','राजमा']],['chole',['Chole (kabuli)','काबुली चना']],['bread',['Bread/pav','ब्रेड/पाव']],['tortillas',['Tortillas','टॉर्टिला']],['breadcrumbs',['Breadcrumbs','ब्रेडक्रम्ब्स']],['cheese',['Cheese','चीज़']],['milk',['Milk','दूध']],['butter',['Butter','मक्खन']],['cream',['Cream','क्रीम']],['yogurt',['Curd','दही']],['coconut-milk',['Coconut/coconut milk','नारियल/नारियल दूध']],['soy',['Soy sauce','सोया सॉस']],['miso',['Miso','मीसो']],['curry-paste',['Thai curry paste','थाई करी पेस्ट']]]]
];
function renderPantry(){
  document.getElementById('pantry').innerHTML=PANTRY.map(([gk,items])=>
    `<h3 style="font-size:12px;letter-spacing:.8px;text-transform:uppercase;color:var(--muted);margin:14px 0 6px">${LT(gk)}</h3>
    <div class="pgrid">${items.map(([k,n])=>`<button class="pchip ${pantryHave.includes(k)?'on':''}" onclick="togglePantry('${k}')">${L(n)}</button>`).join('')}</div>`).join('');
}
function pantryName(k){ for(const [,items] of PANTRY){ const f=items.find(([kk])=>kk===k); if(f) return L(f[1]) } return k }
function togglePantry(k){
  if(pantryHave.includes(k)) pantryHave=pantryHave.filter(x=>x!==k); else pantryHave.push(k);
  store.set('pantry',pantryHave); renderPantry(); renderMatches();
}
function renderMatches(){
  const el=document.getElementById('matches');
  if(!pantryHave.length){ el.innerHTML=`<div class="legend">${LT('tickAbove')}</div>`; return }
  const scored=activeRecipes().filter(r=>r.needs&&r.needs.length).map(r=>{
    const have=r.needs.filter(n=>pantryHave.includes(n));
    return {r,have,miss:r.needs.filter(n=>!pantryHave.includes(n)),pct:have.length/r.needs.length};
  }).filter(x=>x.pct>=0.5).sort((a,b)=>b.pct-a.pct).slice(0,12);
  if(!scored.length){ el.innerHTML=`<div class="legend">${LT('noMatch')}</div>`; return }
  el.innerHTML=scored.map(x=>`<div class="match"><div class="top" onclick="openRecipe('${x.r.id}')">
    <div><b>${esc(L(x.r.n))}</b><div style="font-size:12px;color:var(--muted)">${pName(x.r.p)} · ${x.r.tm} ${LT('min')}</div></div>
    <span class="pct">${Math.round(x.pct*100)}%</span></div>
    ${x.miss.length?`<div class="miss">${LT('needed')}: ${x.miss.map(pantryName).join(', ')}</div>`:`<div class="have">${LT('allHome')}</div>`}
  </div>`).join('');
}

/* ================= SETTINGS ================= */
function openSettings(){
  const q=settings.quota;
  let h=`<h2>${LT('settings')}</h2>
  <h3>${LT('quotaHead')}</h3>
  <div class="qgrid">
    ${['chicken','fish','beef','mutton','pork'].map(t=>`<div class="qcell"><label>${pName(t)}</label><input type="number" min="0" max="14" id="q-${t}" value="${q[t]||0}" onchange="saveQuota()"></div>`).join('')}
  </div>
  <div class="hint" style="font-size:12.5px;color:var(--muted)">${LT('quotaNote')}</div>

    <input type="number" min="0" max="7" id="t-ind" value="${settings.indianDinners}" onchange="saveTuning()" style="width:64px;border:2px solid var(--ink);border-radius:10px;padding:8px;text-align:center;font-family:var(--body-font);background:var(--card)"></div>
  <div class="setrow"><div><b>${LT('heavyDin')}</b></div>
    <input type="number" min="0" max="4" id="t-heavy" value="${settings.heavyDinners}" onchange="saveTuning()" style="width:64px;border:2px solid var(--ink);border-radius:10px;padding:8px;text-align:center;font-family:var(--body-font);background:var(--card)"></div>
  <h3>${LT('tasteHead')}</h3>
  <div class="hint" style="font-size:12.5px;color:var(--muted);margin-bottom:8px">${LT('tasteNote')}</div>
  ${tasteProfileHtml()}
  <h3>${LT('trashHead')} (${trashed.length})</h3>
  ${trashed.length
    ? `<div style="font-size:13px;margin-bottom:8px">${trashed.map(id=>{const r=byId(id);return r?`<div class="setrow" style="padding:8px 0"><span>${esc(L(r.n))}</span><button class="btn ghost small" onclick="restoreDish('${id}');openSettings()">${LT('restoreDish')}</button></div>`:''}).join('')}</div>
      ${trashed.length>=10?`<div class="note">${LT('trashFull').replace('{n}',trashed.length)}</div>`:''}`
    : `<div class="hint" style="font-size:12.5px;color:var(--muted)">${LT('trashEmpty')}</div>`}
  <div class="btnrow"><button class="btn ghost small" onclick="resetTaste()">${LT('resetTaste')}</button></div>
  <div class="setrow" style="display:block"><b>${LT('bfToggle')}</b>
    <div class="pgrid" style="margin-top:8px">
      ${[['off','bfOff'],['weekend','bfWknd'],['all','bfDaily']].map(([v,k])=>`<button class="pchip ${(settings.breakfast===v||(v==='all'&&settings.breakfast===true)||(v==='off'&&settings.breakfast===false))?'on':''}" onclick="setBfMode('${v}')">${LT(k)}</button>`).join('')}
    </div></div>
  <h3>${LT('data')}</h3>
  <div class="btnrow"><button class="btn ghost small" onclick="copyPickData()">${LT('pickData')}</button></div>
  <div class="btnrow">
    <button class="btn ghost small" onclick="backup()">${LT('backup')}</button>
    <button class="btn ghost small" onclick="document.getElementById('restorefile').click()">${LT('restore')}</button>
    <button class="btn ghost small" onclick="resetAll()">${LT('reset')}</button>
  </div>
  <input type="file" id="restorefile" accept=".json" style="display:none" onchange="restore(this)">
  <div class="legend" style="margin-top:14px">${LT('deviceNote')}</div>`;
  openSheetHtml(h);
}
function saveTuning(){
  settings.indianDinners=Math.max(0,Math.min(7,+document.getElementById('t-ind').value||0));
  settings.heavyDinners=Math.max(0,Math.min(4,+document.getElementById('t-heavy').value||0));
  store.set('settings',settings);
}
function tasteProfileHtml(){
  const rated=allRecipes().map(r=>({r,k:tasteRank(r.id)})).filter(x=>Math.abs(x.k)>0.5);
  if(!rated.length) return `<div class="hint" style="font-size:12.5px;color:var(--muted)">${LT('noTaste')}</div>`;
  const top=rated.filter(x=>x.k>0).sort((a,b)=>b.k-a.k).slice(0,5);
  const low=rated.filter(x=>x.k<0).sort((a,b)=>a.k-b.k).slice(0,5);
  let h='';
  if(top.length) h+=`<div style="margin-bottom:6px"><b style="font-size:12.5px;color:var(--dhaniya)">${LT('favs')}:</b> <span style="font-size:13px">${top.map(x=>esc(L(x.r.n))).join(' · ')}</span></div>`;
  if(low.length) h+=`<div style="margin-bottom:6px"><b style="font-size:12.5px;color:var(--mirchi)">${LT('resting')}:</b> <span style="font-size:13px">${low.map(x=>esc(L(x.r.n))).join(' · ')}</span></div>`;
  return h;
}
function resetTaste(){ taste={scores:{},stars:{}}; store.set('taste',taste); openSettings(); toast(LT('tasteCleared')) }
function saveQuota(){
  const q={};
  ['chicken','fish','beef','mutton','pork'].forEach(t=>{ q[t]=Math.max(0,Math.min(14,+document.getElementById('q-'+t).value||0)) });
  settings.quota=q; store.set('settings',settings);
}
function setBfMode(v){ settings.breakfast=(v==='off'?false:v); store.set('settings',settings); openSettings(); renderPlan() }
function copyPickData(){
  const sum={};
  pickLog.forEach(e=>{
    (e.c||[]).forEach(id=>{ sum[id]=sum[id]||{pick:0,offer:0,rej:0}; sum[id].pick++ });
    (e.o||[]).forEach(id=>{ sum[id]=sum[id]||{pick:0,offer:0,rej:0}; sum[id].offer++ });
    (e.r||[]).forEach(id=>{ sum[id]=sum[id]||{pick:0,offer:0,rej:0}; sum[id].rej++ });
  });
  const summary={};
  Object.entries(sum).forEach(([id,v])=>{
    const r=byId(id);
    summary[id]={name:r?r.n[0]:id, protein:r?r.p:'?', cuisine:r?r.cz:'?', picked:v.pick, offered:v.offer, refreshed_away:v.rej};
  });
  const payload={generated:new Date().toISOString(), events:pickLog.length,
    trashed:trashed.map(id=>byId(id)?byId(id).n[0]:id),
    liked:Object.keys(taste.stars).filter(id=>taste.stars[id]==='more').map(id=>byId(id)?byId(id).n[0]:id),
    rarely:Object.keys(taste.stars).filter(id=>taste.stars[id]==='less').map(id=>byId(id)?byId(id).n[0]:id),
    my_ideas:(function(){ const agg={}; ideasLog.forEach(e=>{ const k=e.x.toLowerCase(); agg[k]=agg[k]||{dish:e.x,times:0,meals:[]}; agg[k].times++; if(!agg[k].meals.includes(e.m)) agg[k].meals.push(e.m) }); return Object.values(agg) })(),
    summary, recent_events:pickLog.slice(-120)};
  navigator.clipboard.writeText(JSON.stringify(payload,null,1)).then(()=>toast(LT('pickCopied')));
}
function backup(){
  const data={custom,hidden,plan,grocery,pantry:pantryHave,settings,history,taste,pickLog,trashed,ideasLog};
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([JSON.stringify(data,null,2)],{type:'application/json'}));
  a.download='ghar-ka-menu-backup.json'; a.click();
}
function restore(inp){
  const f=inp.files[0]; if(!f) return;
  const rd=new FileReader();
  rd.onload=()=>{ try{
    const d=JSON.parse(rd.result);
    if(d.custom) {custom=d.custom; store.set('custom',custom)}
    if(d.hidden) {hidden=d.hidden; store.set('hidden',hidden)}
    if(d.plan!==undefined) {plan=d.plan; store.set('plan',plan)}
    if(d.grocery) {grocery=d.grocery; store.set('grocery',grocery)}
    if(d.pantry) {pantryHave=d.pantry; store.set('pantry',pantryHave)}
    if(d.settings) {settings=d.settings; if(!settings.quota) settings.quota={chicken:5,fish:4,beef:2,mutton:1,pork:1}; store.set('settings',settings)}
    if(d.history) {history=d.history; store.set('history',history)}
    if(d.taste) {taste=d.taste; if(!taste.scores)taste.scores={}; if(!taste.stars)taste.stars={}; store.set('taste',taste)}
    if(d.pickLog) {pickLog=d.pickLog; store.set('plog',pickLog)}
    if(d.trashed) {trashed=d.trashed; store.set('trashed',trashed)}
    if(d.ideasLog) {ideasLog=d.ideasLog; store.set('ideas',ideasLog)}
    normalizePlan(); renderAll(); closeSheet(); toast(LT('restored'));
  }catch(e){ toast(LT('badFile')) } };
  rd.readAsText(f);
}
function resetAll(){
  if(!confirm(LT('resetConfirm'))) return;
  plan=null; grocery={items:[]}; history={}; sideHist={};
  store.set('plan',null); store.set('grocery',grocery); store.set('history',{}); store.set('sideHist',{});
  renderAll(); closeSheet(); toast(LT('resetDone'));
}

/* ================= LANG / TABS / INIT ================= */
function applyLang(){
  document.body.classList.toggle('hi',lang==='hi');
  document.getElementById('lang-en').classList.toggle('on',lang==='en');
  document.getElementById('lang-hi').classList.toggle('on',lang==='hi');
  document.getElementById('t-plansub').textContent=LT('plansub');
  document.getElementById('t-genbtn').textContent=LT('gen');
  document.getElementById('t-wabtn').textContent='🟢 WhatsApp';
  document.getElementById('t-copybtn').textContent=LT('copy');
  document.getElementById('t-bzsub').textContent=LT('bzsub');
  document.getElementById('t-bzbuild').textContent=LT('bzbuild');
  document.getElementById('t-bzshare').textContent=LT('bzshare');
  document.getElementById('gadd').placeholder=LT('bzadd');
  document.getElementById('rsearch').placeholder=LT('search');
  document.getElementById('t-tnsub').textContent=LT('tnsub');
  document.getElementById('t-tnhead').textContent=LT('tnhead');
  document.getElementById('t-tab-plan').textContent=LT('tabPlan');
  document.getElementById('t-tab-recipes').textContent=LT('tabRecipes');
  document.getElementById('t-tab-bazaar').textContent=LT('tabBazaar');
  document.getElementById('t-tab-tonight').textContent=LT('tabTonight');
}
function setLang(l){ lang=l; store.set('lang',l); applyLang(); renderAll(); closeSheet() }
function goTab(p,btn){
  document.querySelectorAll('.page').forEach(x=>x.classList.remove('on'));
  document.getElementById('page-'+p).classList.add('on');
  document.querySelectorAll('nav.tabs button').forEach(x=>x.classList.remove('on'));
  if(btn) btn.classList.add('on');
  window.scrollTo(0,0);
}
let toastTimer;
function toast(msg){
  const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('on');
  clearTimeout(toastTimer); toastTimer=setTimeout(()=>t.classList.remove('on'),2200);
}
function renderAll(){ applyLang(); renderPlan(); renderFilters(); renderRecipes(); renderGrocery(); renderPantry(); renderMatches() }
normalizePlan();
renderAll();
</script>
